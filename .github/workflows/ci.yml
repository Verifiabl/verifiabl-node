name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # The published tarball must type-resolve for both CommonJS and ESM
      # consumers. A dual-published package can pass every check above and still
      # be unimportable from CJS TypeScript, which is how VER-236 shipped.
      - run: npm run check:exports

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Dependency scanning (SCA): fail on known vulnerabilities in
      # production dependencies.
      - run: npm audit --omit=dev --audit-level=low
