name: Release

# Publishes to npm when a GitHub release is published.
#
# Auth uses npm "trusted publishing" (OIDC), with no long-lived token secret.
# One-time setup on npmjs.com after the first manual publish of "verifiabl":
#   verifiabl package Settings → Trusted Publisher → GitHub Actions
#   repository: Verifiabl/verifiabl-node, workflow: release.yml
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token for npm provenance + trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Default checkout (no `ref:`). On `release` events actions/checkout
      # >=6.0.2 keeps the tag ref so npm provenance gets a SourceRepositoryRef.
      # Passing an explicit `ref:` forces a detached checkout at the bare SHA,
      # which drops that ref again and makes npm reject the bundle with
      # "Missing SourceRepositoryRef" (npm/cli#8699). Pinned >=6.0.2 here.
      - uses: actions/checkout@v6 # >=6.0.2 required for the release-ref fix
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      # Trusted publishing requires a recent npm
      - run: npm install -g npm@latest
      # prepublishOnly runs typecheck + tests + build before publish
      - run: npm publish --provenance --access public
