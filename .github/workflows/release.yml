name: Release

# Publishes to npm when a GitHub release is published.
#
# Auth uses npm "trusted publishing" (OIDC), with no long-lived token secret.
# One-time setup on npmjs.com after the first manual publish of "verifiabl":
#   verifiabl package Settings → Trusted Publisher → GitHub Actions
#   repository: Verifiabl/verifiabl-node, workflow: release.yml
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token for npm provenance + trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Check out the released tag explicitly. On `release` events, older
      # actions/checkout left HEAD detached at the bare commit, dropping the
      # tag ref and producing a provenance cert with no SourceRepositoryRef,
      # which npm rejects (npm/cli#8699; checkout fix landed in 6.0.2).
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      # Trusted publishing requires a recent npm
      - run: npm install -g npm@latest
      # prepublishOnly runs typecheck + tests + build before publish
      - run: npm publish --provenance --access public
